# Minecraft PE Server Configuration
# Автор: Minecraft PE Server Team
# Версия: 1.0.0

# Основные настройки сервера
server-name=Minecraft PE Server
server-port=19132
max-players=20

# Настройки мира
level-name=world
level-type=default
level-seed=0
gamemode=survival
difficulty=normal
spawn-protection=16

# Игровые настройки
hardcore=false
pvp=true

# Системные настройки
backup-interval=3600
auto-save=true
auto-save-interval=300

# Сетевые настройки
raknet-protocol-version=11
minecraft-protocol-version=662
mtu-size=1492

# Настройки производительности
tps=20
chunk-load-distance=8
max-chunk-loads-per-tick=4

# Настройки логирования
log-level=INFO
log-file=server.log