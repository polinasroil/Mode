# Minecraft PE Server Configuration (Bedrock протокол для телефона)
# Автор: Minecraft PE Server Team
# Версия: 1.0.0

# Основные настройки сервера
server-name=Minecraft PE Server
server-port=19132
max-players=20

# Настройки мира
level-name=world
level-type=default
level-seed=0
gamemode=survival
difficulty=normal
spawn-protection=16

# Игровые настройки
hardcore=false
pvp=true

# Системные настройки
backup-interval=3600
auto-save=true
auto-save-interval=300

# Bedrock протокол (Minecraft PE на телефоне)
bedrock-protocol-version=662
bedrock-game-version=1.20.50
bedrock-allow-cheats=false
bedrock-texturepack-required=false

# Настройки производительности
tps=20
chunk-load-distance=8
max-chunk-loads-per-tick=4

# Настройки логирования
log-level=INFO
log-file=server.log